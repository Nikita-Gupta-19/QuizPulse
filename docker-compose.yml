version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: quizpulse-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - quizpulse-network

  backend:
    build: ./backend
    container_name: quizpulse-backend
    ports:
      - "8000:8000"
    environment:
      - MONGO_URI=mongodb://mongodb:27017
      - DB_NAME=quizpulse
    depends_on:
      - mongodb
    networks:
      - quizpulse-network

  frontend:
    build: ./frontend
    container_name: quizpulse-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    networks:
      - quizpulse-network

networks:
  quizpulse-network:
    driver: bridge

volumes:
  mongo-data:
    driver: local
